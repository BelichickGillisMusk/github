name: Deploy CARB Sites

# Builds sites/sites.json -> sites/dist/* and deploys every site as its own
# Cloudflare Worker. Adding a new site to sites.json automatically gets it
# deployed on the next run — no workflow edits needed.

on:
  push:
    branches: [main, master, "claude/**"]
    paths:
      - "sites/**"
      - ".github/workflows/deploy-sites.yml"
  workflow_dispatch:
    inputs:
      only:
        description: "Deploy only this site id (leave blank for all)"
        required: false
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.list.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build all sites
        run: node sites/build.mjs
      - name: List generated sites
        id: list
        run: |
          if [ -n "${{ github.event.inputs.only }}" ]; then
            echo "sites=[\"${{ github.event.inputs.only }}\"]" >> $GITHUB_OUTPUT
          else
            sites=$(ls sites/dist | jq -R . | jq -sc .)
            echo "sites=$sites" >> $GITHUB_OUTPUT
          fi
      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sites-dist
          path: sites/dist
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.build.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sites-dist
          path: sites/dist
      - name: Deploy ${{ matrix.site }} to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: bafa242dd95d3fdce72540d20accd0a2
          workingDirectory: sites/dist/${{ matrix.site }}
          command: deploy
